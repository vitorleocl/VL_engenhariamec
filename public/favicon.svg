<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 20 125 120" fill="none">
  <defs>
    <!-- Metallic gradient matching the main branding -->
    <linearGradient id="silver-metal-favicon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" />
      <stop offset="30%" stopColor="#ced4da" />
      <stop offset="70%" stopColor="#868e96" />
      <stop offset="100%" stopColor="#343a40" />
    </linearGradient>
    
    <!-- Gear tooth templates scaled -->
    <g id="gear-tooth-fav">
      <path d="M -5,-52 L -3,-62 L 3,-62 L 5,-52 Z" fill="url(#silver-metal-favicon)" stroke="#495057" stroke-width="0.5" />
    </g>
  </defs>

  <!-- Outer silver crescent element -->
  <path d="M 55,35 A 56,56 0 0,1 138,55" stroke="url(#silver-metal-favicon)" stroke-width="4.5" stroke-linecap="round" fill="none" />
  
  <!-- Dark blue top-right accent sweep -->
  <path d="M 55,41 A 52,52 0 0,1 131,63" stroke="#0f284e" stroke-width="5" stroke-linecap="round" fill="none" />

  <!-- Outer silver gear/circular rim -->
  <circle cx="85" cy="80" r="52" stroke="url(#silver-metal-favicon)" stroke-width="6" fill="none" />

  <!-- Metallic gear teeth rotated along the left sector -->
  <g transform="translate(85, 80)">
    <g transform="rotate(110)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(130)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(150)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(170)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(190)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(210)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(230)"><use href="#gear-tooth-fav" /></g>
    <g transform="rotate(250)"><use href="#gear-tooth-fav" /></g>
  </g>

  <!-- Subtle dashed inner circle -->
  <circle cx="85" cy="80" r="44" stroke="url(#silver-metal-favicon)" stroke-width="1.5" stroke-dasharray="2.5 2.5" fill="none" opacity="0.8" />

  <!-- Core brand monogram elements -->
  <g transform="translate(85, 80)">
    <!-- High-visibility slanted deep blue V -->
    <path 
      d="M -40,-28 L -17,-28 L 0,20 L 17,-28 L 31,-28 L -2,34 L -10,34 Z" 
      fill="#0f284e" 
    />
    <!-- Stylized bright blue slanted L -->
    <path 
      d="M 37,-28 L 50,-28 L 25,18 L 58,18 L 49,34 L 4,34 Z" 
      fill="#0066d4" 
    />
  </g>
</svg>
